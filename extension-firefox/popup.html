<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 420px; margin: 0; padding: 14px; }
    h1 { font-size: 15px; margin: 0 0 4px; color: #b71c1c; }
    .sub { font-size: 12px; color: #666; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; padding: 5px 6px; border-bottom: 1px solid #eee; vertical-align: top; }
    th { color: #444; background: #fafafa; }
    .empty { color: #777; font-size: 13px; padding: 16px 0; }
    .btns { margin-top: 12px; display: flex; gap: 8px; }
    button { border: 1px solid #bbb; background: #fff; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
    button.primary { border-color: #b71c1c; color: #b71c1c; font-weight: 600; }
    .note { font-size: 11px; color: #888; margin-top: 10px; line-height: 1.4; }
    .doms { color: #b71c1c; }
  </style>
</head>
<body>
  <h1>⚠️ Affected clinics detected</h1>
  <div class="sub">Senders of flagged emails — their accounts are likely compromised. Phone them (don't email) to warn them.</div>
  <div id="list"></div>
  <div class="btns">
    <button id="copy" class="primary">Copy list</button>
    <button id="clear">Clear list</button>
  </div>
  <label style="display:flex;align-items:center;gap:6px;margin-top:12px;font-size:12px;">
    <input type="checkbox" id="central" style="width:auto;">
    Also report detections to Dental Phish Watch (a private, write-only list seen ONLY by the campaign coordinator, so affected clinics get a warning phone call). Sends: sender address/name, attack domains, detection reasons. Never the email contents.
  </label>
  <div class="note">Your own list above is stored only in this browser. A flagged sender is a strong indicator, not proof — verify by phone before naming anyone publicly.</div>
  <script src="popup.js"></script>
</body>
</html>
